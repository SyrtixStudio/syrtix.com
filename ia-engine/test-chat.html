<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syrtix AI Test Chat</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 500px; background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #334155; padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; }
        #input-container { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 6px; border: none; background: #0f172a; color: white; }
        button { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #64748b; }
    </style>
</head>
<body>
    <h2>🤖 Syrtix AI Chat Test</h2>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-container">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        const SECRET = "syrtix_super_secret_123";

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendChat() {
            const question = userInput.value;
            if (!question) return;

            addMessage(question, 'user');
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3001/api/ia/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SECRET}`
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                addMessage(data.answer || "Error sin respuesta", 'ai');
            } catch (error) {
                addMessage("Error al conectar con el servidor", 'ai');
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
    </script>
</body>
</html>
