    <script>
      (function () {
        var key = 'syrtix_copy_variant';
        var variants = {
          a: {
            title: 'Syrtix | Compra tu pagina web profesional',
            description:
              'Compra tu pagina web profesional con Syrtix. Desarrollamos sitios web, tiendas online y landing pages enfocadas en conversion.',
            ogDescription:
              'Compra tu pagina web profesional con Syrtix. Sitios web orientados a conversion para hacer crecer tu negocio.',
            twitterDescription:
              'Compra tu pagina web profesional con Syrtix. Sitios web orientados a conversion y resultados.',
          },
          b: {
            title: 'Syrtix | Cotiza y compra tu pagina web hoy',
            description:
              'Cotiza y compra tu pagina web hoy con Syrtix. Creamos sitios web y tiendas online listos para vender.',
            ogDescription:
              'Cotiza y compra tu pagina web hoy con Syrtix. Desarrollo web enfocado en conversion y ventas.',
            twitterDescription:
              'Cotiza y compra tu pagina web hoy con Syrtix. Sitios web listos para crecer tu negocio.',
          },
        };

        var params = new URLSearchParams(window.location.search);
        var forcedVariant = params.get('ab');
        var variant =
          forcedVariant === 'a' || forcedVariant === 'b'
            ? forcedVariant
            : window.localStorage.getItem(key);

        if (variant !== 'a' && variant !== 'b') {
          variant = Math.random() < 0.5 ? 'a' : 'b';
        }

        window.localStorage.setItem(key, variant);
        var selected = variants[variant];
        if (!selected) return;

        document.title = selected.title;

        var setMeta = function (selector, value) {
          var element = document.querySelector(selector);
          if (element) {
            element.setAttribute('content', value);
          }
        };

        setMeta('meta[name="description"]', selected.description);
        setMeta('meta[property="og:title"]', selected.title);
        setMeta('meta[property="og:description"]', selected.ogDescription);
        setMeta('meta[name="twitter:title"]', selected.title);
        setMeta('meta[name="twitter:description"]', selected.twitterDescription);
      })();
    </script>
