    <script>
      (function () {
        var key = 'syrtix_copy_variant';
        var variants = {
          a: {
            title: 'Syrtix | Crea y Compra tu Página Web hoy',
            description:
              '¿Quieres crear o comprar una página web profesional? En Syrtix desarrollamos tu sitio web, tienda online o landing page en tiempo récord.',

              'Crea o compra tu página web profesional con Syrtix. Resultados garantizados y enfoque en ventas.',
            twitterDescription:
              'Crea o compra tu página web profesional con Syrtix. El mejor diseño web de Chile.',
          },
          b: {
            title: 'Syrtix | Dónde Comprar tu Página Web Profesional',
            description:
              'La mejor opción para comprar tu página web profesional. Creamos sitios web corporativos y tiendas online listos para vender desde el primer día.',
            ogDescription:
              'Compra tu página web hoy con Syrtix. Expertos en desarrollo web enfocado en conversión.',
            twitterDescription:
              '¿Pensando en comprar tu web? Syrtix es la agencia líder en resultados reales.',
          },
        };

        var params = new URLSearchParams(window.location.search);
        var forcedVariant = params.get('ab');
        var variant =
          forcedVariant === 'a' || forcedVariant === 'b'
            ? forcedVariant
            : window.localStorage.getItem(key);

        if (variant !== 'a' && variant !== 'b') {
          variant = Math.random() < 0.5 ? 'a' : 'b';
        }

        window.localStorage.setItem(key, variant);
        var selected = variants[variant];
        if (!selected) return;

        document.title = selected.title;

        var setMeta = function (selector, value) {
          var element = document.querySelector(selector);
          if (element) {
            element.setAttribute('content', value);
          }
        };

        setMeta('meta[name="description"]', selected.description);
        setMeta('meta[property="og:title"]', selected.title);
        setMeta('meta[property="og:description"]', selected.ogDescription);
        setMeta('meta[name="twitter:title"]', selected.title);
        setMeta('meta[name="twitter:description"]', selected.twitterDescription);
      })();
    </script>
